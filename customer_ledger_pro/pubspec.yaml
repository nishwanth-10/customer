name: customer_ledger_pro
description: Customer Ledger Pro — Smart payment management for small businesses
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: 2.5.1
  riverpod_annotation: 2.3.5

  # Navigation
  go_router: 14.2.0

  # Networking
  dio: 5.4.3
  pretty_dio_logger: 1.3.1

  # Local Storage / Offline
  hive_flutter: 1.1.0
  flutter_secure_storage: 9.2.2
  shared_preferences: 2.2.3

  # Firebase
  firebase_core: 3.1.0
  firebase_auth: 5.1.0
  firebase_messaging: 15.0.0
  google_sign_in: 6.2.1

  # Notifications
  flutter_local_notifications: 17.2.1

  # UI
  google_fonts: ^6.3.0
  lottie: 3.1.2
  cached_network_image: 3.3.1
  shimmer: 3.0.0
  fl_chart: 0.67.0
  flutter_svg: 2.0.10
  image_picker: 1.1.2
  photo_view: 0.14.0
  badges: 3.1.2

  # Utilities
  intl: 0.20.2
  uuid: 4.4.0
  url_launcher: 6.3.0
  share_plus: 9.0.0
  permission_handler: 11.3.1
  connectivity_plus: 6.0.3
  path_provider: 2.1.3
  file_picker: 8.0.7

  # PDF / Excel
  pdf: 3.11.1
  printing: 5.13.1
  open_filex: ^4.5.0
  excel: 4.0.3

  # Animations
  animations: 2.0.11
  flutter_animate: 4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0
  build_runner: 2.4.9
  riverpod_generator: 2.4.0
  hive_generator: 2.0.1
  json_annotation: 4.9.0
  json_serializable: 6.8.0
  flutter_native_splash: 2.4.1
  flutter_launcher_icons: 0.13.1

platforms:
  android:
  ios:

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/lottie/



flutter_native_splash:
  color: "#3730A3"
  image: assets/images/splash_logo.png
  color_dark: "#1E1B4B"
  image_dark: assets/images/splash_logo.png
  android_12:
    color: "#3730A3"
    icon_background_color: "#3730A3"

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#3730A3"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

dependency_overrides:
  open_filex: ^4.5.0
